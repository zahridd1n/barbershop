<div class="dashboard-nav">
    <div class="dashboard-brand">
        {% if barber.image %}
            <img src="{{ barber.image.url }}" alt="{{ barber.name }}" class="dashboard-avatar">
        {% else %}
            <div class="dashboard-avatar-placeholder">{{ barber.name|make_list|first|upper }}</div>
        {% endif %}
        <div class="dashboard-user-info">
            <span class="dashboard-user-name">{{ barber.name }}</span>
            <span class="dashboard-user-status">Online</span>
        </div>
    </div>

    <ul class="dashboard-menu">
        <li>
            <a href="{% url 'frontend:barber-dashboard' %}" class="{% if request.resolver_match.url_name == 'barber-dashboard' %}active{% endif %}">
                <i class="bi bi-grid-1x2"></i>
                <span>Umumiy</span>
            </a>
        </li>
        <li>
            <a href="{% url 'frontend:barber-profile' %}" class="{% if request.resolver_match.url_name == 'barber-profile' %}active{% endif %}">
                <i class="bi bi-person"></i>
                <span>Profil</span>
            </a>
        </li>
        <li>
            <a href="{% url 'frontend:barber-services' %}" class="{% if request.resolver_match.url_name == 'barber-services' %}active{% endif %}">
                <i class="bi bi-scissors"></i>
                <span>Xizmatlar</span>
            </a>
        </li>
        <li>
            <a href="{% url 'frontend:barber-gallery' %}" class="{% if request.resolver_match.url_name == 'barber-gallery' %}active{% endif %}">
                <i class="bi bi-images"></i>
                <span>Portfolio</span>
            </a>
        </li>
        <li>
            <a href="{% url 'frontend:barber-bookings' %}" class="{% if request.resolver_match.url_name == 'barber-bookings' %}active{% endif %}">
                <i class="bi bi-calendar-check"></i>
                <span>Buyurtmalar</span>
            </a>
        </li>
    </ul>

    <div class="dashboard-footer">
        <a href="{% url 'frontend:barber-logout' %}" class="dashboard-logout">
            <i class="bi bi-box-arrow-left"></i>
            <span>Chiqish</span>
        </a>
    </div>
</div>

<style>
    .dashboard-nav { width: 260px; background: #12121a; border-right: 1px solid #2a2a3a; position: fixed; height: 100vh; display: flex; flex-direction: column; }
    .dashboard-brand { padding: 1.5rem; display: flex; align-items: center; gap: 1rem; border-bottom: 1px solid #2a2a3a; }
    .dashboard-avatar { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; border: 2px solid #c89b63; }
    .dashboard-avatar-placeholder { width: 48px; height: 48px; border-radius: 50%; background: #c89b63; color: #1a1a24; display: flex; align-items: center; justify-content: center; font-size: 1.25rem; font-weight: 700; }
    .dashboard-user-info { display: flex; flex-direction: column; }
    .dashboard-user-name { font-weight: 600; color: #e8e8ec; }
    .dashboard-user-status { font-size: 0.75rem; color: #22c55e; }
    .dashboard-menu { list-style: none; padding: 1rem 0; margin: 0; flex: 1; }
    .dashboard-menu li a { display: flex; align-items: center; gap: 0.75rem; padding: 0.875rem 1.5rem; color: #8888a0; text-decoration: none; transition: all 0.2s ease; }
    .dashboard-menu li a:hover, .dashboard-menu li a.active { background: rgba(200, 155, 99, 0.1); color: #c89b63; border-right: 3px solid #c89b63; }
    .dashboard-menu i { font-size: 1.25rem; }
    .dashboard-footer { padding: 1rem; border-top: 1px solid #2a2a3a; }
    .dashboard-logout { display: flex; align-items: center; gap: 0.75rem; padding: 0.875rem 1rem; color: #8888a0; text-decoration: none; }
    .dashboard-logout:hover { color: #ef4444; }
    @media (max-width: 991px) {
        .dashboard-nav { width: 72px; }
        .dashboard-user-info, .dashboard-menu span, .dashboard-footer span { display: none; }
        .dashboard-menu a { justify-content: center; padding: 1rem; }
    }
</style>
