{% load static %}
<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Kirish | BossBarber Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="{% static 'frontend/css/site.css' %}?v={% now 'U' %}" rel="stylesheet">
</head>
<body class="login-body">
    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-header">
                {% if contact and contact.logo %}
                    <img src="{{ contact.logo.url }}" alt="Logo" class="login-logo">
                {% else %}
                    <div class="login-logo-icon">
                        <i class="bi bi-scissors"></i>
                    </div>
                {% endif %}
                <h1 class="login-title">BossBarber</h1>
                <p class="login-subtitle">Sartarosh sifatida kirish</p>
            </div>

            {% if error %}
                <div class="login-error">
                    <i class="bi bi-exclamation-circle"></i>
                    <span>{{ error }}</span>
                </div>
            {% endif %}

            <form method="post" class="login-form" autocomplete="off">
                {% csrf_token %}
                <div class="login-field">
                    <label for="username">
                        <i class="bi bi-person"></i>
                        Login
                    </label>
                    <input
                        type="text"
                        id="username"
                        name="username"
                        value="{{ username|default:'' }}"
                        placeholder="barber_123456"
                        required
                        autofocus
                    >
                </div>
                <div class="login-field">
                    <label for="password">
                        <i class="bi bi-lock"></i>
                        Parol
                    </label>
                    <div class="login-password-wrap">
                        <input
                            type="password"
                            id="password"
                            name="password"
                            placeholder="••••••••"
                            required
                        >
                        <button type="button" class="login-eye" id="togglePassword">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" class="login-btn">
                    <span>Kirish</span>
                    <i class="bi bi-arrow-right"></i>
                </button>
            </form>

            <div class="login-footer">
                <p>Sartarosh bo'lishni xohlaysizmi?</p>
                <a href="https://t.me/test_py_bot" target="_blank">
                    <i class="bi bi-telegram"></i> Telegram bot orqali ariza qoldiring
                </a>
            </div>
        </div>

        <a href="{% url 'frontend:home' %}" class="login-back">
            <i class="bi bi-arrow-left"></i> Bosh sahifaga qaytish
        </a>
    </div>

    <script>
        document.getElementById('togglePassword')?.addEventListener('click', function() {
            const input = document.getElementById('password');
            const icon = this.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'bi bi-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'bi bi-eye';
            }
        });
    </script>
</body>
</html>
